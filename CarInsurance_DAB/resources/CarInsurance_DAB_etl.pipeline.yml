# The main pipeline for CarInsurance_DAB

resources:
  pipelines:
    CarInsurance_DAB_etl:
      name: CarInsurance_DAB_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/CarInsurance_DAB_etl"

      libraries:
        - glob:
            include: ../src/CarInsurance_DAB_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
